<!DOCTYPE html>
<html>
<head>
    <title>Online Order Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .order-id {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Timeline/Progress Bar */
        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        /* Progress Line Behind */
        .progress-line {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e0e0e0;
            z-index: 0;
        }

        .progress-line-active {
            position: absolute;
            top: 20px;
            left: 0;
            height: 3px;
            background: #4CAF50;
            z-index: 1;
            transition: width 0.5s ease;
        }

        /* Status Circles */
        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            flex: 1;
        }

        .status-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: default;
        }

        .status-circle.active {
            background: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
            transform: scale(1.1);
        }

        .status-circle.completed {
            background: #4CAF50;
        }

        .status-label {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: #666;
            font-weight: 500;
        }

        .status-label.active {
            color: #4CAF50;
            font-weight: bold;
        }

        /* Order Details */
        .order-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: #666;
            font-weight: bold;
        }

        .detail-value {
            color: #333;
        }

        /* Status Message */
        .status-message {
            background: #e8f5e9;
            border-left: 4px solid #4CAF50;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            color: #2e7d32;
            font-size: 14px;
        }

        .status-message.warning {
            background: #fff3e0;
            border-left-color: #f57c00;
            color: #e65100;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-next {
            background: #667eea;
            color: white;
        }

        .btn-next:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f57c00;
            color: white;
        }

        .btn-reset:hover {
            background: #e65100;
            transform: translateY(-2px);
        }

        /* Timestamp */
        .timestamp {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 Order Tracking</h1>
        <p class="order-id">Order ID: #ORD-2024-001</p>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-line"></div>
            <div class="progress-line-active" id="progressLineActive"></div>

            <div class="status-item">
                <div class="status-circle completed" id="status0">✓</div>
                <div class="status-label">Order Placed</div>
            </div>

            <div class="status-item">
                <div class="status-circle" id="status1">📦</div>
                <div class="status-label">Processing</div>
            </div>

            <div class="status-item">
                <div class="status-circle" id="status2">🚚</div>
                <div class="status-label">Shipped</div>
            </div>

            <div class="status-item">
                <div class="status-circle" id="status3">📍</div>
                <div class="status-label">Out for Delivery</div>
            </div>

            <div class="status-item">
                <div class="status-circle" id="status4">🎉</div>
                <div class="status-label">Delivered</div>
            </div>
        </div>

        <!-- Status Message -->
        <div class="status-message" id="statusMessage">
            ✓ Your order has been placed successfully!
        </div>

        <!-- Order Details -->
        <div class="order-details">
            <div class="detail-row">
                <span class="detail-label">Order Date:</span>
                <span class="detail-value">Dec 15, 2024</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Expected Delivery:</span>
                <span class="detail-value" id="expectedDate">Dec 20, 2024</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Tracking Number:</span>
                <span class="detail-value">TRK-987654321</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Current Status:</span>
                <span class="detail-value" id="currentStatus">Order Placed</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="btn-next" id="nextBtn">Next Status →</button>
            <button class="btn-reset" id="resetBtn">Reset</button>
        </div>

        <!-- Timestamp -->
        <div class="timestamp" id="timestamp">Last updated: Just now</div>
    </div>

    <script>
        // Define status data
        const statuses = [
            {
                name: "Order Placed",
                message: "✓ Your order has been placed successfully!",
                icon: "✓",
                daysToAdd: 0
            },
            {
                name: "Processing",
                message: "📦 Your order is being processed and packed.",
                icon: "📦",
                daysToAdd: 1
            },
            {
                name: "Shipped",
                message: "🚚 Your order has been shipped! It's on its way.",
                icon: "🚚",
                daysToAdd: 2
            },
            {
                name: "Out for Delivery",
                message: "📍 Your order is out for delivery today!",
                icon: "📍",
                daysToAdd: 3
            },
            {
                name: "Delivered",
                message: "🎉 Your order has been delivered! Thank you!",
                icon: "🎉",
                daysToAdd: 4,
                isCompleted: true
            }
        ];

        // DOM Elements
        const nextBtn = document.getElementById("nextBtn");
        const resetBtn = document.getElementById("resetBtn");
        const statusMessage = document.getElementById("statusMessage");
        const currentStatusEl = document.getElementById("currentStatus");
        const expectedDateEl = document.getElementById("expectedDate");
        const timestampEl = document.getElementById("timestamp");
        const progressLineActive = document.getElementById("progressLineActive");

        // Current status index
        let currentStatusIndex = 0;

        // Initialize
        updateUI();

        // Next Button Click
        nextBtn.addEventListener("click", () => {
            if (currentStatusIndex < statuses.length - 1) {
                currentStatusIndex++;
                updateUI();
            }
        });

        // Reset Button Click
        resetBtn.addEventListener("click", () => {
            currentStatusIndex = 0;
            updateUI();
        });

        // Update UI
        function updateUI() {
            // Update status circles
            for (let i = 0; i < statuses.length; i++) {
                const circle = document.getElementById(`status${i}`);
                circle.textContent = statuses[i].icon;
                circle.classList.remove("active", "completed");

                if (i < currentStatusIndex) {
                    circle.classList.add("completed");
                } else if (i === currentStatusIndex) {
                    circle.classList.add("active");
                }
            }

            // Update progress line
            const progressPercent = (currentStatusIndex / (statuses.length - 1)) * 100;
            progressLineActive.style.width = progressPercent + "%";

            // Update status message
            const status = statuses[currentStatusIndex];
            statusMessage.textContent = status.message;
            statusMessage.classList.toggle("warning", !status.isCompleted);

            // Update current status text
            currentStatusEl.textContent = status.name;

            // Update expected date
            const baseDate = new Date("2024-12-15");
            const deliveryDate = new Date(baseDate);
            deliveryDate.setDate(deliveryDate.getDate() + status.daysToAdd);
            expectedDateEl.textContent = deliveryDate.toLocaleDateString("en-US", {
                year: "numeric",
                month: "short",
                day: "numeric"
            });

            // Update timestamp
            timestampEl.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

            // Disable/Enable next button
            nextBtn.disabled = currentStatusIndex >= statuses.length - 1;
            nextBtn.textContent = currentStatusIndex >= statuses.length - 1 
                ? "✓ Order Delivered" 
                : "Next Status →";
        }
    </script>

</body>
</html>
